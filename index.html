<!DOCTYPE html>
<html lang="ja">
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CORE-01</title>

  <style>
    body
    {
      background:#0a0a0a;
      color:white;
      font-family:sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
      padding:20px;
    }
  
  .card
    {
      border:1px solid #333;
      padding:30px;
      border-radius:20px;
      max-width:300px;
    }
  
  .title
    {
      font-size:12px;
      color:#888;
      letter-spacing:3px;
    }
  
  .message
    {
      font-size:24px;
      margin-top:15px;
    }
  </style>
</head>

  
<body>
<div class="card">
<div class="title">CORE-01</div>
<div id="message" class="message"></div>
</div>

<script>
  const data = 
    [
      "今日はもう十分頑張った",
      "水飲んだ？",
      "☾ 満月まであと3日",
      "ラッキーアイテム：イヤホン",
      "今日の一曲：晴る",
      "散歩すると良い発見あり",
      "夜更かし注意"
    ];
  
  const random =
  data[Math.floor(Math.random()*data.length)];
  
  document.getElementById("message").innerText = random;
</script>

</body>
</html>
